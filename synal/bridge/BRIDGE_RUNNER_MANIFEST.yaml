version: "2.1"
project: synal
repo: TML-4PM/ai-evolution-program
branch: synal-ship-20260414
pickup_root: synal/

metadata:
  rdti: true
  is_rd: true
  project_code: SYNAL-EDGE-01
  wave: 10
  autonomy: GATED

lambdas:
  - name: synal-task-intake
    handler: lambdas/synal-task-intake/handler.handler
    runtime: nodejs20.x
    memory: 256
    timeout: 15
    env:
      SUPABASE_URL: "{{SUPABASE_URL}}"
      SUPABASE_SERVICE_KEY: "{{SUPABASE_SERVICE_KEY}}"
    routes:
      - POST /synal/task-intake
      - GET  /synal/health
    schedule: null
    kill_switch: SYNAL_TASK_INTAKE_ENABLED

  - name: synal-auto-execute
    handler: lambdas/synal-auto-execute/handler.handler
    runtime: nodejs20.x
    memory: 256
    timeout: 30
    env:
      SUPABASE_URL: "{{SUPABASE_URL}}"
      SUPABASE_SERVICE_KEY: "{{SUPABASE_SERVICE_KEY}}"
    routes:
      - GET /synal/task-run
      - POST /synal/task-status
    schedule: rate(30 minutes)
    kill_switch: SYNAL_AUTO_EXECUTE_ENABLED

supabase:
  instance: S1
  migrations:
    - supabase/migrations/001_synal_core.sql

extension:
  product: Snaps
  brand: Synal
  tagline: "Snaps by Synal"
  version: "1.0.1"
  manifest_version: 3
  path: extension/snaps/
  accent: "#8B5CF6"

verification:
  post_deploy:
    - lambda: synal-task-intake GET /synal/health → {status: healthy}
    - supabase: SELECT count(*) FROM synal_tasks → no error
    - table: synal_event_log has rows

rollback:
  cap_secrets_key: SYNAL_TASK_INTAKE_ENABLED
  set_to: false
  on_failure: auto

telemetry:
  table: synal_event_log
  trace_field: trace_id
  emit_on: [TASK_CREATED, TASK_EXECUTED, TASK_FAILED]
